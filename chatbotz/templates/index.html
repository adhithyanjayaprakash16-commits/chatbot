<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhii Bus | Modern AI Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <main id="chat-app">
        <!-- Header -->
        <header class="chat-header">
            <div class="brand">
                <div class="logo-circle">
                    <i class="fas fa-bus"></i>
                </div>
                <div class="header-info">
                    <h1>Adhii Bus AI</h1>
                    <p>Smart Travel Partner for Tamil Nadu</p>
                </div>
            </div>
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>AI Core Online</span>
            </div>
        </header>

        <!-- Chat Area -->
        <div class="chat-body" id="chatArea">
            <!-- Welcome Message -->
            <div class="message bot-msg">
                <div class="bubble">
                    Welcome to <strong>Adhii Bus Travels</strong>! 🚌<br>
                    I can help you check routes, book tickets, and manage your trips across Tamil Nadu. How can I help you today?
                </div>
                <span class="timestamp">Just now</span>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div class="quick-actions-container">
            <div class="typing" id="typingIndicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions-container">
            <button class="action-btn" onclick="quickAction('Book a bus')"><i class="fas fa-ticket"></i> Book Ticket</button>
            <button class="action-btn" onclick="quickAction('Bus Timings')"><i class="fas fa-clock"></i> Bus Timings</button>
            <button class="action-btn" onclick="quickAction('Cancel booking')"><i class="fas fa-xmark"></i> Cancel</button>
            <button class="action-btn" onclick="quickAction('Check PNR')"><i class="fas fa-search"></i> PNR Status</button>
            <button class="action-btn" onclick="quickAction('Refund policy')"><i class="fas fa-money-bill"></i> Refunds</button>
        </div>

        <!-- Footer / Input -->
        <footer class="chat-footer">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ask about routes, fares, booking..." autocomplete="off">
                <button class="send-btn" id="sendBtn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <p class="disclaimer">Adhii Chatbot v2.0 | Academic Project Demo</p>
        </footer>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
