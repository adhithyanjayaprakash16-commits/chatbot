<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhii - TN Bus Booking Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="intro-pane">
            <h1>Adhii</h1>
            <p>Your intelligent companion for bus travel across Tamil Nadu. Search, book, and track in seconds.</p>
            <div class="quick-links">
                <button class="action-btn" onclick="quickAction('I want to book a ticket')">🎫 Book Ticket</button>
                <button class="action-btn" onclick="quickAction('Show me bus timings')">🕒 Bus Timings</button>
                <button class="action-btn" onclick="quickAction('Where is my bus?')">📍 Live Tracking</button>
                <button class="action-btn" onclick="quickAction('Cancellation policy')">❌ Cancellation</button>
                <button class="action-btn" onclick="quickAction('Emergency contact')">🆘 Support</button>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-wrapper">
            <div class="chat-header">
                <div class="avatar">
                    <img src="{{ url_for('static', filename='avatar.png') }}" alt="Adhii Avatar">
                </div>
                <div class="title-meta">
                    <h2>Adhii Bot</h2>
                    <span class="online-status">● Online</span>
                </div>
            </div>

            <div id="chat-box" class="chat-box">
                <div class="message bot-message">
                    <div class="content">Vanakkam! I'm Adhii. How can I assist you with your Tamil Nadu travel today?</div>
                </div>
                <!-- Messages will appear here -->
            </div>

            <div id="typing-indicator" class="typing" style="display: none;">Adhii is typing...</div>

            <div class="chat-footer">
                <div class="input-group">
                    <input type="text" id="user-input" placeholder="Ask about buses, routes, or tickets..." autocomplete="off">
                    <button id="send-btn" title="Send Message">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
